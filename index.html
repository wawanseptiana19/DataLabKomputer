<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notepad - Tersimpan Online</title>

<!-- Library resmi Supabase, dibutuhkan supaya kita bisa "berlangganan siaran
     langsung" (realtime) perubahan data, bukan cuma tanya sekali lalu selesai -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
  /* ===== CSS: tampilan seperti aplikasi Notepad sungguhan =====
     Ada 2 kolom: kiri = daftar catatan, kanan = area menulis */

  :root{
    --biru-tua: #1e3a5f;
    --biru-terang: #2b6cb0;
    --abu-terang: #f4f6f8;
    --abu-garis: #d9dfe4;
    --putih: #ffffff;
    --merah: #c53030;
  }

  * { box-sizing: border-box; }

  html, body{
    height: 100%;
    margin: 0;
    font-family: "Segoe UI", Arial, sans-serif;
    color: #1a202c;
  }

  .app{
    display: flex;
    height: 100vh;
  }

  /* ===== KOLOM KIRI: daftar catatan, seperti daftar file di Notepad ===== */
  .panel-daftar{
    width: 260px;
    flex-shrink: 0;
    background: var(--abu-terang);
    border-right: 1px solid var(--abu-garis);
    display: flex;
    flex-direction: column;
  }

  .panel-daftar .judul-panel{
    padding: 16px;
    background: var(--biru-tua);
    color: white;
    font-size: 15px;
    font-weight: 600;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  /* Titik kecil berkedip = penanda sambungan realtime masih hidup */
  .indikator-live{
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 11px;
    font-weight: 600;
    color: #a0e0c8;
  }
  .indikator-live .titik{
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: #48bb78;
  }
  .indikator-live.putus{ color: #f6a8a8; }
  .indikator-live.putus .titik{ background: var(--merah); }

  .btn-baru{
    margin: 12px;
    padding: 9px;
    background: var(--biru-terang);
    color: white;
    border: none;
    border-radius: 6px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
  }
  .btn-baru:hover{ background: var(--biru-tua); }

  .daftar-catatan{
    flex: 1;
    overflow-y: auto;
    padding: 0 8px;
  }

  .item-catatan{
    padding: 10px 12px;
    border-radius: 6px;
    cursor: pointer;
    margin-bottom: 4px;
    font-size: 13.5px;
  }
  .item-catatan:hover{ background: #e6eaee; }
  .item-catatan.aktif{ background: var(--biru-terang); color: white; }
  .item-catatan .judul-item{
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .item-catatan .cuplikan{
    font-size: 12px;
    opacity: 0.75;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-top: 2px;
  }

  /* Badge label, seperti stiker kecil berwarna di pojok catatan */
  .badge-label{
    display: inline-block;
    font-size: 11px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 20px;
    margin-top: 4px;
    margin-right: 4px;
    background: #dbe7f3;
    color: var(--biru-tua);
  }
  .item-catatan.aktif .badge-label{
    background: rgba(255,255,255,0.25);
    color: white;
  }

  /* Badge status, seperti lampu indikator hidup/mati/perbaikan */
  .badge-status{
    display: inline-block;
    font-size: 11px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 20px;
    margin-top: 4px;
    margin-right: 4px;
    color: white;
  }
  .badge-status.hidup{ background: #0e7c86; }
  .badge-status.mati{ background: var(--merah); }
  .badge-status.perbaikan{ background: #b7791f; }

  /* Badge IP, seperti label kecil abu-abu berisi alamat IP */
  .badge-ip{
    display: inline-block;
    font-size: 11px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 20px;
    margin-top: 4px;
    background: #edf2f7;
    color: #4a5568;
    font-family: "Consolas", monospace;
  }
  .item-catatan.aktif .badge-ip{
    background: rgba(255,255,255,0.25);
    color: white;
  }

  /* Baris filter label di atas daftar catatan */
  .filter-label{
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    padding: 0 12px 10px 12px;
  }
  .chip-filter{
    font-size: 11.5px;
    font-weight: 600;
    padding: 4px 10px;
    border-radius: 20px;
    border: 1px solid var(--abu-garis);
    background: white;
    color: #4a5568;
    cursor: pointer;
  }
  .chip-filter.aktif{
    background: var(--biru-terang);
    color: white;
    border-color: var(--biru-terang);
  }

  .info-daftar-kosong{
    text-align: center;
    color: #718096;
    font-size: 13px;
    padding: 20px 12px;
  }

  /* ===== KOLOM KANAN: area menulis, seperti lembar Notepad ===== */
  .panel-tulis{
    flex: 1;
    display: flex;
    flex-direction: column;
    background: var(--putih);
  }

  .bilah-atas{
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 20px;
    border-bottom: 1px solid var(--abu-garis);
  }

  .status-simpan{
    font-size: 12.5px;
    color: #718096;
  }

  .tombol{
    padding: 8px 14px;
    border-radius: 6px;
    border: none;
    font-size: 13.5px;
    font-weight: 600;
    cursor: pointer;
    margin-left: 8px;
  }
  .tombol-utama{ background: var(--biru-terang); color: white; }
  .tombol-utama:hover{ background: var(--biru-tua); }
  .tombol-hapus{ background: var(--merah); color: white; }
  .tombol-hapus:hover{ background: #9b2c2c; }
  .tombol:disabled{ opacity: 0.5; cursor: not-allowed; }

  #input-judul{
    border: none;
    font-size: 22px;
    font-weight: 700;
    padding: 20px 24px 8px 24px;
    color: var(--biru-tua);
  }
  #input-judul:focus{ outline: none; }
  #input-judul::placeholder{ color: #a0aec0; }

  /* Baris label di editor, di bawah judul */
  .baris-label{
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 0 24px 8px 24px;
    flex-wrap: wrap;
  }
  .baris-label label{
    font-size: 12.5px;
    color: #718096;
    font-weight: 600;
  }
  #input-label{
    font-size: 13px;
    padding: 5px 10px;
    border: 1px solid var(--abu-garis);
    border-radius: 20px;
    max-width: 200px;
  }
  #input-label:focus{ outline: 2px solid var(--biru-terang); outline-offset: 1px; }

  #input-status{
    font-size: 13px;
    padding: 5px 10px;
    border: 1px solid var(--abu-garis);
    border-radius: 20px;
    background: white;
  }
  #input-status:focus{ outline: 2px solid var(--biru-terang); outline-offset: 1px; }

  #input-ip{
    font-size: 13px;
    padding: 5px 10px;
    border: 1px solid var(--abu-garis);
    border-radius: 20px;
    max-width: 150px;
    font-family: "Consolas", monospace;
  }
  #input-ip:focus{ outline: 2px solid var(--biru-terang); outline-offset: 1px; }
  #input-ip:invalid{ border-color: var(--merah); }

  #input-isi{
    flex: 1;
    border: none;
    resize: none;
    padding: 8px 24px 24px 24px;
    font-size: 15px;
    line-height: 1.7;
    font-family: "Segoe UI", Arial, sans-serif;
  }
  #input-isi:focus{ outline: none; }

  .layar-kosong{
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #a0aec0;
    font-size: 14px;
    text-align: center;
    padding: 20px;
  }
</style>
</head>
<body>

<div class="app">

  <!-- KOLOM KIRI: daftar semua catatan -->
  <div class="panel-daftar">
    <div class="judul-panel">
      <span>Catatan Saya</span>
      <span class="indikator-live" id="indikator-live"><span class="titik"></span> Live</span>
    </div>
    <button class="btn-baru" id="btn-baru">+ Catatan baru</button>
    <div class="filter-label" id="filter-label">
      <!-- Diisi otomatis: satu chip per label yang ada, plus "Semua" -->
    </div>
    <div class="daftar-catatan" id="daftar-catatan">
      <!-- Diisi otomatis oleh JavaScript -->
    </div>
  </div>

  <!-- KOLOM KANAN: area menulis -->
  <div class="panel-tulis" id="panel-tulis" style="display:none;">
    <div class="bilah-atas">
      <span class="status-simpan" id="status-simpan">Belum ada perubahan</span>
      <div>
        <button class="tombol tombol-hapus" id="btn-hapus">Hapus</button>
        <button class="tombol tombol-utama" id="btn-simpan">Simpan</button>
      </div>
    </div>
    <input type="text" id="input-judul" placeholder="Judul catatan...">
    <div class="baris-label">
      <label for="input-label">Label:</label>
      <input type="text" id="input-label" placeholder="Contoh: Tugas, Ide, Penting" list="daftar-label-saran">
      <datalist id="daftar-label-saran">
        <!-- Diisi otomatis dari label-label yang sudah pernah dipakai -->
      </datalist>
      <label for="input-status">Status:</label>
      <select id="input-status">
        <option value="hidup">Hidup</option>
        <option value="mati">Mati</option>
        <option value="perbaikan">Perbaikan</option>
      </select>
      <label for="input-ip">IP:</label>
      <input type="text" id="input-ip" placeholder="192.168.1.10"
             pattern="^(\d{1,3}\.){3}\d{1,3}$" title="Format IP: contoh 192.168.1.10">
    </div>
    <textarea id="input-isi" placeholder="Tulis catatanmu di sini..."></textarea>
  </div>

  <!-- Tampil kalau belum ada catatan yang dipilih -->
  <div class="layar-kosong" id="layar-kosong">
    Pilih catatan di sebelah kiri, atau klik "+ Catatan baru" untuk mulai menulis.
  </div>

</div>

<script>
  /* ===== JAVASCRIPT =====
     Analogi: Supabase adalah GUDANG PENYIMPANAN ONLINE.
     Setiap kali kita "Simpan", kita mengirim paket data ke gudang itu
     lewat internet (pakai fungsi fetch). Setiap kali membuka aplikasi,
     kita "meminta" gudang mengirimkan kembali semua catatan yang ada. */

  // Alamat gudang (project Supabase) dan kunci masuknya
  const SUPABASE_URL = "https://qzdvdfebkzlwkhvxwsju.supabase.co/rest/v1";
  const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF6ZHZkZmVia3psd2todnh3c2p1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3MzcyMTA4OTksImV4cCI6MjA1Mjc4Njg5OX0.Z9XKmX49vu0kZwn6YMom8QeLNNdKQMXCIkxcIoHKQFs";
  const TABEL = "catatan"; // nama tabel yang kita buat lewat SQL Editor

  // Header ini seperti "kartu identitas" yang wajib disertakan
  // setiap kali kita mengirim permintaan ke gudang Supabase
  const headerDasar = {
    "apikey": SUPABASE_KEY,
    "Authorization": "Bearer " + SUPABASE_KEY,
    "Content-Type": "application/json"
  };

  // Klien khusus untuk REALTIME: ini yang membuka "kabel telepon terbuka"
  // ke Supabase, supaya kita diberi tahu setiap kali ada perubahan data,
  // tanpa perlu terus-menerus bertanya (polling).
  const supabaseClient = window.supabase.createClient(
    "https://qzdvdfebkzlwkhvxwsju.supabase.co",
    SUPABASE_KEY
  );

  // "Rak sementara" di memori browser, isinya salinan data dari gudang
  let daftarCatatan = [];
  let idAktif = null;       // catatan mana yang sedang dibuka
  let waktuTimer = null;    // dipakai untuk auto-save setelah berhenti mengetik
  let labelAktif = null;    // label mana yang sedang dipakai untuk menyaring (null = semua)

  // Ambil elemen-elemen HTML yang akan kita atur
  const elDaftar = document.getElementById('daftar-catatan');
  const elFilterLabel = document.getElementById('filter-label');
  const elPanelTulis = document.getElementById('panel-tulis');
  const elLayarKosong = document.getElementById('layar-kosong');
  const elInputJudul = document.getElementById('input-judul');
  const elInputLabel = document.getElementById('input-label');
  const elDaftarLabelSaran = document.getElementById('daftar-label-saran');
  const elInputStatus = document.getElementById('input-status');
  const elInputIp = document.getElementById('input-ip');
  const elInputIsi = document.getElementById('input-isi');
  const elStatus = document.getElementById('status-simpan');

  // ===== 1. MENGAMBIL DATA DARI SUPABASE (seperti membuka gudang & lihat isinya) =====
  async function muatSemuaCatatan() {
    elDaftar.innerHTML = '<p class="info-daftar-kosong">Memuat catatan...</p>';
    try {
      const respon = await fetch(
        `${SUPABASE_URL}/${TABEL}?select=*&order=diubah_pada.desc`,
        { headers: headerDasar }
      );
      if (!respon.ok) throw new Error('Gagal memuat data (' + respon.status + ')');
      daftarCatatan = await respon.json();
      gambarDaftar();
    } catch (kesalahan) {
      elDaftar.innerHTML = '<p class="info-daftar-kosong">Gagal terhubung ke Supabase.<br>Pastikan tabel "catatan" sudah dibuat.</p>';
      console.error(kesalahan);
    }
  }

  // Menggambar ulang daftar catatan di kolom kiri (menghormati filter label yang aktif)
  function gambarDaftar() {
    gambarChipFilter();
    gambarSaranLabel();

    // Saring dulu berdasarkan label yang sedang dipilih (kalau ada)
    const dataTampil = labelAktif === null
      ? daftarCatatan
      : daftarCatatan.filter(c => (c.label || '').trim() === labelAktif);

    if (dataTampil.length === 0) {
      elDaftar.innerHTML = '<p class="info-daftar-kosong">Belum ada catatan.</p>';
      return;
    }

    elDaftar.innerHTML = '';
    dataTampil.forEach(function (c) {
      const item = document.createElement('div');
      item.className = 'item-catatan' + (c.id === idAktif ? ' aktif' : '');
      const labelHTML = c.label
        ? `<div class="badge-label">${escapeHTML(c.label)}</div>`
        : '';
      const teksStatus = { hidup: 'Hidup', mati: 'Mati', perbaikan: 'Perbaikan' }[c.status] || 'Hidup';
      const statusHTML = `<div class="badge-status ${c.status || 'hidup'}">${teksStatus}</div>`;
      const ipHTML = c.ip
        ? `<div class="badge-ip">${escapeHTML(c.ip)}</div>`
        : '';
      item.innerHTML = `
        <div class="judul-item">${escapeHTML(c.judul || 'Tanpa judul')}</div>
        <div class="cuplikan">${escapeHTML((c.isi || '').slice(0, 40) || 'Kosong')}</div>
        ${labelHTML}${statusHTML}${ipHTML}
      `;
      item.addEventListener('click', function () { bukaCatatan(c.id); });
      elDaftar.appendChild(item);
    });
  }

  // Mengumpulkan semua label unik yang sedang dipakai, lalu menggambar
  // "chip" filter di atas daftar (seperti tab pemilah warna stiker)
  function gambarChipFilter() {
    const labelUnik = [...new Set(
      daftarCatatan.map(c => (c.label || '').trim()).filter(l => l !== '')
    )];

    if (labelUnik.length === 0) {
      elFilterLabel.innerHTML = '';
      return;
    }

    let html = `<span class="chip-filter${labelAktif === null ? ' aktif' : ''}" data-label="">Semua</span>`;
    labelUnik.forEach(function (l) {
      html += `<span class="chip-filter${labelAktif === l ? ' aktif' : ''}" data-label="${escapeHTML(l)}">${escapeHTML(l)}</span>`;
    });
    elFilterLabel.innerHTML = html;

    // Pasang "penjaga pintu" klik untuk tiap chip
    elFilterLabel.querySelectorAll('.chip-filter').forEach(function (chip) {
      chip.addEventListener('click', function () {
        const nilai = chip.getAttribute('data-label');
        labelAktif = nilai === '' ? null : nilai;
        gambarDaftar();
      });
    });
  }

  // Mengisi daftar saran (autocomplete) di input label, dari label yang sudah pernah dipakai
  function gambarSaranLabel() {
    const labelUnik = [...new Set(
      daftarCatatan.map(c => (c.label || '').trim()).filter(l => l !== '')
    )];
    elDaftarLabelSaran.innerHTML = labelUnik
      .map(l => `<option value="${escapeHTML(l)}"></option>`)
      .join('');
  }

  function escapeHTML(teks) {
    const div = document.createElement('div');
    div.textContent = teks;
    return div.innerHTML;
  }

  // ===== 2. MEMBUAT CATATAN BARU (mengirim paket kosong ke gudang) =====
  document.getElementById('btn-baru').addEventListener('click', async function () {
    try {
      const respon = await fetch(`${SUPABASE_URL}/${TABEL}`, {
        method: 'POST',
        headers: { ...headerDasar, "Prefer": "return=representation" },
        body: JSON.stringify({ judul: '', isi: '', label: '', status: 'hidup', ip: '' })
      });
      if (!respon.ok) throw new Error('Gagal membuat catatan');
      const catatanBaru = await respon.json();
      daftarCatatan.unshift(catatanBaru[0]); // taruh di paling atas rak
      gambarDaftar();
      bukaCatatan(catatanBaru[0].id);
    } catch (kesalahan) {
      alert('Gagal membuat catatan baru. Cek koneksi atau pengaturan Supabase.');
      console.error(kesalahan);
    }
  });

  // ===== 3. MEMBUKA SATU CATATAN UNTUK DIEDIT =====
  function bukaCatatan(id) {
    idAktif = id;
    const catatan = daftarCatatan.find(c => c.id === id);
    if (!catatan) return;

    elInputJudul.value = catatan.judul || '';
    elInputLabel.value = catatan.label || '';
    elInputStatus.value = catatan.status || 'hidup';
    elInputIp.value = catatan.ip || '';
    elInputIsi.value = catatan.isi || '';
    elPanelTulis.style.display = 'flex';
    elLayarKosong.style.display = 'none';
    elStatus.textContent = 'Tersimpan';
    gambarDaftar();
  }

  // ===== 4. MENYIMPAN PERUBAHAN (mengirim update ke gudang) =====
  async function simpanCatatan() {
    if (idAktif === null) return;
    elStatus.textContent = 'Menyimpan...';

    const dataBaru = {
      judul: elInputJudul.value,
      isi: elInputIsi.value,
      label: elInputLabel.value.trim(),
      status: elInputStatus.value,
      ip: elInputIp.value.trim(),
      diubah_pada: new Date().toISOString()
    };

    try {
      const respon = await fetch(`${SUPABASE_URL}/${TABEL}?id=eq.${idAktif}`, {
        method: 'PATCH',
        headers: { ...headerDasar, "Prefer": "return=representation" },
        body: JSON.stringify(dataBaru)
      });
      if (!respon.ok) throw new Error('Gagal menyimpan');
      const hasil = await respon.json();

      // Perbarui juga salinan data di "rak sementara" kita
      const idx = daftarCatatan.findIndex(c => c.id === idAktif);
      if (idx !== -1) daftarCatatan[idx] = hasil[0];

      elStatus.textContent = 'Tersimpan';
      gambarDaftar();
    } catch (kesalahan) {
      elStatus.textContent = 'Gagal menyimpan';
      console.error(kesalahan);
    }
  }

  document.getElementById('btn-simpan').addEventListener('click', simpanCatatan);

  // Auto-save: setelah berhenti mengetik selama 1 detik, otomatis tersimpan.
  // Ini seperti asisten yang menyimpan pekerjaanmu tanpa perlu diminta terus-menerus.
  function jadwalkanAutoSave() {
    elStatus.textContent = 'Mengetik...';
    clearTimeout(waktuTimer);
    waktuTimer = setTimeout(simpanCatatan, 1000);
  }
  elInputJudul.addEventListener('input', jadwalkanAutoSave);
  elInputLabel.addEventListener('input', jadwalkanAutoSave);
  elInputStatus.addEventListener('change', jadwalkanAutoSave);
  elInputIp.addEventListener('input', jadwalkanAutoSave);
  elInputIsi.addEventListener('input', jadwalkanAutoSave);

  // ===== 5. MENGHAPUS CATATAN (membuang kartu dari gudang) =====
  document.getElementById('btn-hapus').addEventListener('click', async function () {
    if (idAktif === null) return;
    const yakin = confirm('Hapus catatan ini? Tindakan ini tidak bisa dibatalkan.');
    if (!yakin) return;

    try {
      const respon = await fetch(`${SUPABASE_URL}/${TABEL}?id=eq.${idAktif}`, {
        method: 'DELETE',
        headers: headerDasar
      });
      if (!respon.ok) throw new Error('Gagal menghapus');

      daftarCatatan = daftarCatatan.filter(c => c.id !== idAktif);
      idAktif = null;
      elPanelTulis.style.display = 'none';
      elLayarKosong.style.display = 'flex';
      gambarDaftar();
    } catch (kesalahan) {
      alert('Gagal menghapus catatan.');
      console.error(kesalahan);
    }
  });

  // ===== 6. MENDENGARKAN SIARAN LANGSUNG (REALTIME) =====
  // Setiap kali ada baris ditambah/diubah/dihapus di tabel "catatan"
  // (oleh kita sendiri ATAU orang lain yang buka aplikasi ini),
  // Supabase akan mengirim "kabar" ke sini secara otomatis.
  const elIndikatorLive = document.getElementById('indikator-live');

  supabaseClient
    .channel('siaran-catatan')
    .on('postgres_changes', { event: '*', schema: 'public', table: TABEL }, function (kabar) {
      if (kabar.eventType === 'INSERT') {
        // Kalau catatan ini belum ada di rak kita (misalnya dibuat oleh
        // komputer lain), tambahkan. Kalau sudah ada (kita sendiri yang
        // baru membuatnya), tidak usah digandakan.
        const sudahAda = daftarCatatan.some(c => c.id === kabar.new.id);
        if (!sudahAda) {
          daftarCatatan.unshift(kabar.new);
          gambarDaftar();
        }
      }

      if (kabar.eventType === 'UPDATE') {
        const idx = daftarCatatan.findIndex(c => c.id === kabar.new.id);
        if (idx !== -1) daftarCatatan[idx] = kabar.new;

        // Kalau catatan yang sedang kita buka diubah oleh ORANG LAIN
        // (bukan kita yang sedang mengetik), perbarui juga tampilan
        // editornya, supaya kita tidak melihat versi lama.
        const sedangMengetik = document.activeElement === elInputJudul ||
                                document.activeElement === elInputLabel ||
                                document.activeElement === elInputStatus ||
                                document.activeElement === elInputIp ||
                                document.activeElement === elInputIsi;
        if (kabar.new.id === idAktif && !sedangMengetik) {
          elInputJudul.value = kabar.new.judul || '';
          elInputLabel.value = kabar.new.label || '';
          elInputStatus.value = kabar.new.status || 'hidup';
          elInputIp.value = kabar.new.ip || '';
          elInputIsi.value = kabar.new.isi || '';
        }
        gambarDaftar();
      }

      if (kabar.eventType === 'DELETE') {
        daftarCatatan = daftarCatatan.filter(c => c.id !== kabar.old.id);
        if (kabar.old.id === idAktif) {
          idAktif = null;
          elPanelTulis.style.display = 'none';
          elLayarKosong.style.display = 'flex';
        }
        gambarDaftar();
      }
    })
    .subscribe(function (status) {
      // Menampilkan status sambungan: hijau kalau tersambung, merah kalau putus
      if (status === 'SUBSCRIBED') {
        elIndikatorLive.classList.remove('putus');
      } else if (status === 'CHANNEL_ERROR' || status === 'TIMED_OUT' || status === 'CLOSED') {
        elIndikatorLive.classList.add('putus');
      }
    });

  // Mulai: ambil semua catatan begitu halaman dibuka
  muatSemuaCatatan();
</script>
