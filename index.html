<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notepad - Tersimpan Online</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
  :root{
    --biru-tua: #1e3a5f;
    --biru-terang: #2b6cb0;
    --abu-terang: #f4f6f8;
    --abu-garis: #d9dfe4;
    --putih: #ffffff;
    --merah: #c53030;
    --hijau: #2f855a;
  }

  * { box-sizing: border-box; }

  html, body{
    height: 100%;
    margin: 0;
    font-family: "Segoe UI", Arial, sans-serif;
    color: #1a202c;
  }

  .app{
    display: flex;
    height: 100vh;
  }

  .panel-daftar{
    width: 260px;
    flex-shrink: 0;
    background: var(--abu-terang);
    border-right: 1px solid var(--abu-garis);
    display: flex;
    flex-direction: column;
  }

  .panel-daftar .judul-panel{
    padding: 16px;
    background: var(--biru-tua);
    color: white;
    font-size: 15px;
    font-weight: 600;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .indikator-live{
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 11px;
    font-weight: 600;
    color: #a0e0c8;
  }
  .indikator-live .titik{
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: #48bb78;
  }
  .indikator-live.putus{ color: #f6a8a8; }
  .indikator-live.putus .titik{ background: var(--merah); }

  .baris-aksi-baru{
    display: flex;
    gap: 8px;
    margin: 12px;
  }

  .btn-baru{
    flex: 1;
    padding: 9px;
    background: var(--biru-terang);
    color: white;
    border: none;
    border-radius: 6px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
  }
  .btn-baru:hover{ background: var(--biru-tua); }

  .btn-upload{
    flex: 1;
    padding: 9px;
    background: var(--hijau);
    color: white;
    border: none;
    border-radius: 6px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
  }
  .btn-upload:hover{ background: #276749; }
  .btn-upload:disabled{ opacity: 0.6; cursor: wait; }

  .daftar-catatan{
    flex: 1;
    overflow-y: auto;
    padding: 0 8px;
  }

  .item-catatan{
    padding: 10px 12px;
    border-radius: 6px;
    cursor: grab;
    margin-bottom: 4px;
    font-size: 13.5px;
    border: 2px solid transparent;
  }
  .item-catatan:hover{ background: #e6eaee; }
  .item-catatan.aktif{ background: var(--biru-terang); color: white; }
  .item-catatan.sedang-diseret{ opacity: 0.4; }
  .item-catatan.target-drop{ border-top: 2px solid var(--hijau); }
  .item-catatan .judul-item{
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .item-catatan .cuplikan{
    font-size: 12px;
    opacity: 0.75;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-top: 2px;
  }

  .badge-label{
    display: inline-block;
    font-size: 11px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 20px;
    margin-top: 4px;
    margin-right: 4px;
    background: #dbe7f3;
    color: var(--biru-tua);
  }
  .item-catatan.aktif .badge-label{
    background: rgba(255,255,255,0.25);
    color: white;
  }

  .badge-status{
    display: inline-block;
    font-size: 11px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 20px;
    margin-top: 4px;
    color: white;
  }
  .badge-status.hidup{ background: #0e7c86; }
  .badge-status.mati{ background: var(--merah); }
  .badge-status.perbaikan{ background: #b7791f; }

  .filter-label{
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    padding: 0 12px 10px 12px;
  }
  .chip-filter{
    font-size: 11.5px;
    font-weight: 600;
    padding: 4px 10px;
    border-radius: 20px;
    border: 1px solid var(--abu-garis);
    background: white;
    color: #4a5568;
    cursor: pointer;
  }
  .chip-filter.aktif{
    background: var(--biru-terang);
    color: white;
    border-color: var(--biru-terang);
  }

  .info-daftar-kosong{
    text-align: center;
    color: #718096;
    font-size: 13px;
    padding: 20px 12px;
  }

  .info-urut{
    font-size: 11.5px;
    color: #718096;
    padding: 0 12px 8px 12px;
  }

  .panel-tulis{
    flex: 1;
    display: flex;
    flex-direction: column;
    background: var(--putih);
  }

  .bilah-atas{
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 20px;
    border-bottom: 1px solid var(--abu-garis);
  }

  .status-simpan{
    font-size: 12.5px;
    color: #718096;
  }

  .tombol{
    padding: 8px 14px;
    border-radius: 6px;
    border: none;
    font-size: 13.5px;
    font-weight: 600;
    cursor: pointer;
    margin-left: 8px;
  }
  .tombol-utama{ background: var(--biru-terang); color: white; }
  .tombol-utama:hover{ background: var(--biru-tua); }
  .tombol-hapus{ background: var(--merah); color: white; }
  .tombol-hapus:hover{ background: #9b2c2c; }
  .tombol-sisip{ background: var(--hijau); color: white; }
  .tombol-sisip:hover{ background: #276749; }
  .tombol:disabled{ opacity: 0.5; cursor: not-allowed; }

  #input-judul{
    border: none;
    font-size: 22px;
    font-weight: 700;
    padding: 20px 24px 8px 24px;
    color: var(--biru-tua);
  }
  #input-judul:focus{ outline: none; }
  #input-judul::placeholder{ color: #a0aec0; }

  .baris-label{
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 0 24px 8px 24px;
  }
  .baris-label label{
    font-size: 12.5px;
    color: #718096;
    font-weight: 600;
  }
  #input-label{
    font-size: 13px;
    padding: 5px 10px;
    border: 1px solid var(--abu-garis);
    border-radius: 20px;
    max-width: 200px;
  }
  #input-label:focus{ outline: 2px solid var(--biru-terang); outline-offset: 1px; }

  #input-status{
    font-size: 13px;
    padding: 5px 10px;
    border: 1px solid var(--abu-garis);
    border-radius: 20px;
    background: white;
  }
  #input-status:focus{ outline: 2px solid var(--biru-terang); outline-offset: 1px; }

  #input-isi{
    flex: 1;
    border: none;
    resize: none;
    padding: 8px 24px 24px 24px;
    font-size: 14.5px;
    line-height: 1.7;
    font-family: "Consolas", "Courier New", monospace;
  }
  #input-isi:focus{ outline: none; }

  .layar-kosong{
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #a0aec0;
    font-size: 14px;
    text-align: center;
    padding: 20px;
  }
</style>
</head>
<body>

<div class="app">

  <div class="panel-daftar">
    <div class="judul-panel">
      <span>Catatan Saya</span>
      <span class="indikator-live" id="indikator-live"><span class="titik"></span> Live</span>
    </div>
    <div class="baris-aksi-baru">
      <button class="btn-baru" id="btn-baru">+ Catatan baru</button>
      <button class="btn-upload" id="btn-upload-txt">⬆ Upload .txt</button>
      <input type="file" id="input-file-txt" accept=".txt,text/plain" style="display:none">
    </div>
    <div class="filter-label" id="filter-label"></div>
    <div class="info-urut">↕ Seret (drag) catatan untuk mengubah urutan</div>
    <div class="daftar-catatan" id="daftar-catatan"></div>
  </div>

  <div class="panel-tulis" id="panel-tulis" style="display:none;">
    <div class="bilah-atas">
      <span class="status-simpan" id="status-simpan">Belum ada perubahan</span>
      <div>
        <button class="tombol tombol-sisip" id="btn-rapikan-spek">🖥 Rapikan Spek PC</button>
        <button class="tombol tombol-sisip" id="btn-sisip-txt">⬆ Sisipkan .txt di sini</button>
        <button class="tombol tombol-hapus" id="btn-hapus">Hapus</button>
        <button class="tombol tombol-utama" id="btn-simpan">Simpan</button>
      </div>
    </div>
    <input type="text" id="input-judul" placeholder="Judul catatan...">
    <div class="baris-label">
      <label for="input-label">Label:</label>
      <input type="text" id="input-label" placeholder="Contoh: Tugas, Ide, Penting" list="daftar-label-saran">
      <datalist id="daftar-label-saran"></datalist>
      <label for="input-status">Status:</label>
      <select id="input-status">
        <option value="hidup">Hidup</option>
        <option value="mati">Mati</option>
        <option value="perbaikan">Perbaikan</option>
      </select>
    </div>
    <textarea id="input-isi" placeholder="Tulis catatanmu di sini..."></textarea>
  </div>

  <div class="layar-kosong" id="layar-kosong">
    Pilih catatan di sebelah kiri, klik "+ Catatan baru" untuk mulai menulis,
    atau klik "⬆ Upload .txt" untuk membuat catatan langsung dari file teks.
  </div>

</div>

<script>
  /* ===== JAVASCRIPT ===== */

  const SUPABASE_URL = "https://qzdvdfebkzlwkhvxwsju.supabase.co/rest/v1";
  const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF6ZHZkZmVia3psd2todnh3c2p1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3MzcyMTA4OTksImV4cCI6MjA1Mjc4Njg5OX0.Z9XKmX49vu0kZwn6YMom8QeLNNdKQMXCIkxcIoHKQFs";
  const TABEL = "catatan";

  const headerDasar = {
    "apikey": SUPABASE_KEY,
    "Authorization": "Bearer " + SUPABASE_KEY,
    "Content-Type": "application/json"
  };

  const supabaseClient = window.supabase.createClient(
    "https://qzdvdfebkzlwkhvxwsju.supabase.co",
    SUPABASE_KEY
  );

  let daftarCatatan = [];
  let idAktif = null;
  let waktuTimer = null;
  let labelAktif = null;
  let idSedangDiseret = null; // catatan mana yang sedang di-drag

  const BATAS_UKURAN_FILE = 2 * 1024 * 1024;
  const JARAK_URUTAN = 100; // jarak antar nomor urut, biar ada "ruang" buat sisipan

  const elDaftar = document.getElementById('daftar-catatan');
  const elFilterLabel = document.getElementById('filter-label');
  const elPanelTulis = document.getElementById('panel-tulis');
  const elLayarKosong = document.getElementById('layar-kosong');
  const elInputJudul = document.getElementById('input-judul');
  const elInputLabel = document.getElementById('input-label');
  const elDaftarLabelSaran = document.getElementById('daftar-label-saran');
  const elInputStatus = document.getElementById('input-status');
  const elInputIsi = document.getElementById('input-isi');
  const elStatus = document.getElementById('status-simpan');
  const elBtnUploadTxt = document.getElementById('btn-upload-txt');
  const elInputFileTxt = document.getElementById('input-file-txt');
  const elBtnSisipTxt = document.getElementById('btn-sisip-txt');
  const elBtnRapikanSpek = document.getElementById('btn-rapikan-spek');

  // ===== Urutan manual =====
  // Setiap catatan punya kolom "urutan" (angka). Semakin kecil, semakin
  // atas. Ini yang dipakai untuk MENGURUTKAN TAMPILAN, terpisah dari kapan
  // data terakhir diubah — jadi urutan tidak pernah berubah sendiri saat
  // ada data masuk (insert/update dari perangkat lain), hanya berubah
  // kalau kamu SENDIRI menyeret (drag) catatannya.
  function nilaiUrutan(c) {
    return (typeof c.urutan === 'number') ? c.urutan : Number.MAX_SAFE_INTEGER;
  }

  function urutanTerkecil() {
    if (daftarCatatan.length === 0) return 0;
    return Math.min.apply(null, daftarCatatan.map(nilaiUrutan)) - JARAK_URUTAN;
  }

  // ===== 1. MENGAMBIL DATA DARI SUPABASE =====
  async function muatSemuaCatatan() {
    elDaftar.innerHTML = '<p class="info-daftar-kosong">Memuat catatan...</p>';
    try {
      const respon = await fetch(
        `${SUPABASE_URL}/${TABEL}?select=*&order=urutan.asc.nullslast,diubah_pada.desc`,
        { headers: headerDasar }
      );
      if (!respon.ok) throw new Error('Gagal memuat data (' + respon.status + ')');
      daftarCatatan = await respon.json();
      gambarDaftar();
    } catch (kesalahan) {
      elDaftar.innerHTML = '<p class="info-daftar-kosong">Gagal terhubung ke Supabase.<br>Pastikan tabel "catatan" sudah dibuat (dan sudah punya kolom "urutan", lihat catatan di bawah kode).</p>';
      console.error(kesalahan);
    }
  }

  // Menggambar ulang daftar catatan di kolom kiri, SELALU diurutkan
  // berdasarkan field "urutan" — bukan berdasarkan urutan array
  // "daftarCatatan" apa adanya. Jadi walau item baru masuk lewat
  // realtime dan ditambahkan sembarang posisi ke array, tampilannya
  // tetap konsisten sesuai urutan yang sudah kamu atur.
  function gambarDaftar() {
    gambarChipFilter();
    gambarSaranLabel();

    const dataTampil = (labelAktif === null
      ? daftarCatatan.slice()
      : daftarCatatan.filter(c => (c.label || '').trim() === labelAktif)
    ).sort((a, b) => nilaiUrutan(a) - nilaiUrutan(b));

    if (dataTampil.length === 0) {
      elDaftar.innerHTML = '<p class="info-daftar-kosong">Belum ada catatan.</p>';
      return;
    }

    elDaftar.innerHTML = '';
    dataTampil.forEach(function (c) {
      const item = document.createElement('div');
      item.className = 'item-catatan' + (c.id === idAktif ? ' aktif' : '');
      item.draggable = true;
      item.dataset.id = c.id;
      const labelHTML = c.label
        ? `<div class="badge-label">${escapeHTML(c.label)}</div>`
        : '';
      const teksStatus = { hidup: 'Hidup', mati: 'Mati', perbaikan: 'Perbaikan' }[c.status] || 'Hidup';
      const statusHTML = `<div class="badge-status ${c.status || 'hidup'}">${teksStatus}</div>`;
      item.innerHTML = `
        <div class="judul-item">${escapeHTML(c.judul || 'Tanpa judul')}</div>
        <div class="cuplikan">${escapeHTML((c.isi || '').slice(0, 40) || 'Kosong')}</div>
        ${labelHTML}${statusHTML}
      `;
      item.addEventListener('click', function () { bukaCatatan(c.id); });
      pasangDragAndDrop(item, c.id);
      elDaftar.appendChild(item);
    });
  }

  // ===== Drag & drop untuk mengatur urutan manual =====
  // Analogi: kartu catatan itu seperti kartu fisik di rak. Kamu ANGKAT
  // satu kartu (dragstart), GESER di atas kartu lain (dragover — di sini
  // cuma kasih tanda garis hijau di atas target), lalu LEPAS (drop) di
  // posisi yang kamu mau. Begitu dilepas, kita hitung ulang nomor urut
  // di sekitar situ saja (bukan seluruh daftar) dan kirim ke Supabase.
  function pasangDragAndDrop(item, id) {
    item.addEventListener('dragstart', function (e) {
      idSedangDiseret = id;
      item.classList.add('sedang-diseret');
      e.dataTransfer.effectAllowed = 'move';
    });

    item.addEventListener('dragend', function () {
      item.classList.remove('sedang-diseret');
      idSedangDiseret = null;
      document.querySelectorAll('.target-drop').forEach(el => el.classList.remove('target-drop'));
    });

    item.addEventListener('dragover', function (e) {
      e.preventDefault();
      if (idSedangDiseret === null || idSedangDiseret === id) return;
      item.classList.add('target-drop');
    });

    item.addEventListener('dragleave', function () {
      item.classList.remove('target-drop');
    });

    item.addEventListener('drop', function (e) {
      e.preventDefault();
      item.classList.remove('target-drop');
      if (idSedangDiseret === null || idSedangDiseret === id) return;
      pindahkanUrutan(idSedangDiseret, id);
    });
  }

  // Menaruh catatan "idDiseret" tepat SEBELUM catatan "idTarget" dalam
  // urutan tampil, dengan menghitung ulang nomor "urutan" secukupnya.
  async function pindahkanUrutan(idDiseret, idTarget) {
    const urut = daftarCatatan.slice().sort((a, b) => nilaiUrutan(a) - nilaiUrutan(b));
    const idxTarget = urut.findIndex(c => c.id === idTarget);
    if (idxTarget === -1) return;

    // Nomor urut tetangga di atas target (yang jadi batas atas rentang baru)
    const urutanAtas = idxTarget > 0 ? nilaiUrutan(urut[idxTarget - 1]) : nilaiUrutan(urut[idxTarget]) - JARAK_URUTAN * 2;
    const urutanBawah = nilaiUrutan(urut[idxTarget]);

    let urutanBaru;
    if (idDiseret === (urut[idxTarget - 1] || {}).id) {
      // Sudah pas di posisi itu, tidak perlu apa-apa
      return;
    }
    // Ambil titik tengah antara dua tetangga sebagai nomor urut baru
    urutanBaru = (urutanAtas + urutanBawah) / 2;

    // Kalau jaraknya sudah terlalu mepet (misalnya sudah sering disisipi),
    // renumber ulang SELURUH daftar dengan jarak rapi supaya ada ruang lagi
    if (!isFinite(urutanBaru) || Math.abs(urutanBawah - urutanAtas) < 1) {
      await renumberSemua(idDiseret, idxTarget);
      return;
    }

    await terapkanUrutanBaru(idDiseret, urutanBaru);
  }

  async function terapkanUrutanBaru(id, urutanBaru) {
    const idx = daftarCatatan.findIndex(c => c.id === id);
    if (idx === -1) return;
    daftarCatatan[idx] = Object.assign({}, daftarCatatan[idx], { urutan: urutanBaru });
    gambarDaftar(); // update tampilan langsung, tidak perlu nunggu server

    try {
      await fetch(`${SUPABASE_URL}/${TABEL}?id=eq.${id}`, {
        method: 'PATCH',
        headers: headerDasar,
        body: JSON.stringify({ urutan: urutanBaru })
      });
    } catch (kesalahan) {
      console.error('Gagal menyimpan urutan baru', kesalahan);
    }
  }

  // Renumber ulang seluruh daftar dengan jarak rapi (0, 100, 200, ...),
  // sambil menyisipkan idDiseret tepat sebelum posisi idxTarget.
  async function renumberSemua(idDiseret, idxTarget) {
    const urut = daftarCatatan.slice().sort((a, b) => nilaiUrutan(a) - nilaiUrutan(b));
    const tanpaDiseret = urut.filter(c => c.id !== idDiseret);
    const catatanDiseret = urut.find(c => c.id === idDiseret);

    // idxTarget dihitung dari daftar LAMA (termasuk yg diseret), jadi
    // sesuaikan posisinya di daftar yg sudah dibuang elemen diseretnya
    let posisiSisip = tanpaDiseret.findIndex(c => c.id === urut[idxTarget].id);
    if (posisiSisip === -1) posisiSisip = tanpaDiseret.length;

    tanpaDiseret.splice(posisiSisip, 0, catatanDiseret);

    const pembaruan = tanpaDiseret.map((c, i) => ({ id: c.id, urutan: i * JARAK_URUTAN }));

    // Perbarui salinan lokal dulu biar tampilan langsung rapi
    pembaruan.forEach(function (p) {
      const idx = daftarCatatan.findIndex(c => c.id === p.id);
      if (idx !== -1) daftarCatatan[idx] = Object.assign({}, daftarCatatan[idx], { urutan: p.urutan });
    });
    gambarDaftar();

    // Kirim semua pembaruan ke Supabase sekaligus (paralel)
    try {
      await Promise.all(pembaruan.map(function (p) {
        return fetch(`${SUPABASE_URL}/${TABEL}?id=eq.${p.id}`, {
          method: 'PATCH',
          headers: headerDasar,
          body: JSON.stringify({ urutan: p.urutan })
        });
      }));
    } catch (kesalahan) {
      console.error('Gagal renumber urutan', kesalahan);
    }
  }

  function gambarChipFilter() {
    const labelUnik = [...new Set(
      daftarCatatan.map(c => (c.label || '').trim()).filter(l => l !== '')
    )];

    if (labelUnik.length === 0) {
      elFilterLabel.innerHTML = '';
      return;
    }

    let html = `<span class="chip-filter${labelAktif === null ? ' aktif' : ''}" data-label="">Semua</span>`;
    labelUnik.forEach(function (l) {
      html += `<span class="chip-filter${labelAktif === l ? ' aktif' : ''}" data-label="${escapeHTML(l)}">${escapeHTML(l)}</span>`;
    });
    elFilterLabel.innerHTML = html;

    elFilterLabel.querySelectorAll('.chip-filter').forEach(function (chip) {
      chip.addEventListener('click', function () {
        const nilai = chip.getAttribute('data-label');
        labelAktif = nilai === '' ? null : nilai;
        gambarDaftar();
      });
    });
  }

  function gambarSaranLabel() {
    const labelUnik = [...new Set(
      daftarCatatan.map(c => (c.label || '').trim()).filter(l => l !== '')
    )];
    elDaftarLabelSaran.innerHTML = labelUnik
      .map(l => `<option value="${escapeHTML(l)}"></option>`)
      .join('');
  }

  function escapeHTML(teks) {
    const div = document.createElement('div');
    div.textContent = teks;
    return div.innerHTML;
  }

  // ===== FITUR "RAPIKAN SPEK PC" =====
  function rapikanSpekPC(teksMentah) {
    const baris = teksMentah.split(/\r?\n/).filter(function (b) { return b.trim() !== ''; });
    const pasangan = [];

    baris.forEach(function (b) {
      const bagian = b.split(/\t+/);
      if (bagian.length >= 2) {
        const kunci = bagian[0].trim();
        const nilai = bagian.slice(1).join(' ').trim();
        if (kunci && nilai) pasangan.push([kunci, nilai]);
      }
    });

    if (pasangan.length < 3) return null;

    const panjangKunciMaksimal = Math.max.apply(null, pasangan.map(function (p) { return p[0].length; }));

    const barisHasil = pasangan.map(function (p) {
      return p[0].padEnd(panjangKunciMaksimal + 1) + ': ' + p[1];
    });

    const entriDeviceName = pasangan.find(function (p) { return /device name/i.test(p[0]); });

    return {
      teks: barisHasil.join('\n'),
      deviceName: entriDeviceName ? entriDeviceName[1] : null
    };
  }

  function sisipkanTeksDiKursor(textarea, teksBaru) {
    const mulai = textarea.selectionStart;
    const akhir = textarea.selectionEnd;
    const nilaiLama = textarea.value;
    textarea.value = nilaiLama.slice(0, mulai) + teksBaru + nilaiLama.slice(akhir);
    const posisiBaru = mulai + teksBaru.length;
    textarea.selectionStart = textarea.selectionEnd = posisiBaru;
  }

  function terapkanHasilRapikan(hasil) {
    if (!hasil) return false;
    elInputIsi.value = hasil.teks;
    if (!elInputLabel.value.trim()) {
      elInputLabel.value = 'Spek PC';
    }
    if (!elInputJudul.value.trim() && hasil.deviceName) {
      elInputJudul.value = 'Spek PC - ' + hasil.deviceName;
    }
    jadwalkanAutoSave();
    return true;
  }

  elInputIsi.addEventListener('paste', function (peristiwa) {
    const papanKlip = peristiwa.clipboardData || window.clipboardData;
    if (!papanKlip) return;
    const teksAsli = papanKlip.getData('text');
    if (!teksAsli) return;

    const hasil = rapikanSpekPC(teksAsli);
    if (!hasil) return;

    peristiwa.preventDefault();
    sisipkanTeksDiKursor(elInputIsi, hasil.teks);
    if (!elInputLabel.value.trim()) elInputLabel.value = 'Spek PC';
    if (!elInputJudul.value.trim() && hasil.deviceName) {
      elInputJudul.value = 'Spek PC - ' + hasil.deviceName;
    }
    jadwalkanAutoSave();
  });

  elBtnRapikanSpek.addEventListener('click', function () {
    if (idAktif === null) return;
    const berhasil = terapkanHasilRapikan(rapikanSpekPC(elInputIsi.value));
    if (!berhasil) {
      alert('Isi catatan ini belum kelihatan seperti format spek PC (butuh minimal 3 baris "Nama Field [TAB] Isi").');
    }
  });

  // Membuat satu catatan baru di Supabase. Catatan baru selalu ditaruh
  // di PALING ATAS urutan manual (urutan = urutan terkecil - JARAK_URUTAN),
  // supaya kamu tidak perlu drag manual tiap bikin catatan baru, tapi
  // urutan catatan lama yang sudah kamu susun tetap aman tidak berubah.
  async function buatCatatanBaru(dataAwal) {
    const respon = await fetch(`${SUPABASE_URL}/${TABEL}`, {
      method: 'POST',
      headers: { ...headerDasar, "Prefer": "return=representation" },
      body: JSON.stringify(Object.assign(
        { judul: '', isi: '', label: '', status: 'hidup', urutan: urutanTerkecil() },
        dataAwal
      ))
    });
    if (!respon.ok) throw new Error('Gagal membuat catatan');
    const hasil = await respon.json();
    return hasil[0];
  }

  document.getElementById('btn-baru').addEventListener('click', async function () {
    try {
      const catatanBaru = await buatCatatanBaru({});
      daftarCatatan.unshift(catatanBaru);
      gambarDaftar();
      bukaCatatan(catatanBaru.id);
    } catch (kesalahan) {
      alert('Gagal membuat catatan baru. Cek koneksi atau pengaturan Supabase.');
      console.error(kesalahan);
    }
  });

  elBtnUploadTxt.addEventListener('click', function () {
    elInputFileTxt.value = '';
    elInputFileTxt.dataset.mode = 'baru';
    elInputFileTxt.click();
  });

  elBtnSisipTxt.addEventListener('click', function () {
    if (idAktif === null) return;
    elInputFileTxt.value = '';
    elInputFileTxt.dataset.mode = 'sisip';
    elInputFileTxt.click();
  });

  elInputFileTxt.addEventListener('change', async function (peristiwa) {
    const file = peristiwa.target.files[0];
    if (!file) return;

    const namaFileLower = file.name.toLowerCase();
    const tipeCocok = namaFileLower.endsWith('.txt') ||
                       file.type === 'text/plain' || file.type === '';
    if (!tipeCocok) {
      alert('Hanya file .txt yang didukung ya.');
      return;
    }
    if (file.size > BATAS_UKURAN_FILE) {
      alert('File terlalu besar (maksimal 2 MB).');
      return;
    }

    const mode = elInputFileTxt.dataset.mode || 'baru';
    const pembaca = new FileReader();

    pembaca.onload = async function () {
      const isiFileMentah = pembaca.result;
      const judulDariNamaFile = file.name.replace(/\.txt$/i, '');

      const hasilRapi = rapikanSpekPC(isiFileMentah);
      const isiFile = hasilRapi ? hasilRapi.teks : isiFileMentah;

      try {
        if (mode === 'sisip' && idAktif !== null) {
          elInputIsi.value = isiFile;
          if (hasilRapi && !elInputLabel.value.trim()) elInputLabel.value = 'Spek PC';
          await simpanCatatan();
          elStatus.textContent = 'Tersimpan (isi dari ' + file.name + ')';
        } else {
          elBtnUploadTxt.disabled = true;
          elBtnUploadTxt.textContent = 'Mengunggah...';
          const judulFinal = (hasilRapi && hasilRapi.deviceName)
            ? 'Spek PC - ' + hasilRapi.deviceName
            : judulDariNamaFile;
          const catatanBaru = await buatCatatanBaru({
            judul: judulFinal,
            isi: isiFile,
            label: hasilRapi ? 'Spek PC' : ''
          });
          daftarCatatan.unshift(catatanBaru);
          gambarDaftar();
          bukaCatatan(catatanBaru.id);
        }
      } catch (kesalahan) {
        alert('Gagal menyimpan isi file ke catatan.');
        console.error(kesalahan);
      } finally {
        elBtnUploadTxt.disabled = false;
        elBtnUploadTxt.textContent = '⬆ Upload .txt';
      }
    };

    pembaca.onerror = function () {
      alert('Gagal membaca file. Coba lagi.');
    };

    pembaca.readAsText(file, 'UTF-8');
  });

  function bukaCatatan(id) {
    idAktif = id;
    const catatan = daftarCatatan.find(c => c.id === id);
    if (!catatan) return;

    elInputJudul.value = catatan.judul || '';
    elInputLabel.value = catatan.label || '';
    elInputStatus.value = catatan.status || 'hidup';
    elInputIsi.value = catatan.isi || '';
    elPanelTulis.style.display = 'flex';
    elLayarKosong.style.display = 'none';
    elStatus.textContent = 'Tersimpan';
    gambarDaftar();
  }

  // Simpan konten catatan. SENGAJA tidak menyentuh field "urutan" di
  // sini, supaya menyimpan isi/judul/label/status tidak pernah ikut
  // menggeser posisi catatan di daftar.
  async function simpanCatatan() {
    if (idAktif === null) return;
    elStatus.textContent = 'Menyimpan...';

    const dataBaru = {
      judul: elInputJudul.value,
      isi: elInputIsi.value,
      label: elInputLabel.value.trim(),
      status: elInputStatus.value,
      diubah_pada: new Date().toISOString()
    };

    try {
      const respon = await fetch(`${SUPABASE_URL}/${TABEL}?id=eq.${idAktif}`, {
        method: 'PATCH',
        headers: { ...headerDasar, "Prefer": "return=representation" },
        body: JSON.stringify(dataBaru)
      });
      if (!respon.ok) throw new Error('Gagal menyimpan');
      const hasil = await respon.json();

      const idx = daftarCatatan.findIndex(c => c.id === idAktif);
      if (idx !== -1) daftarCatatan[idx] = hasil[0];

      elStatus.textContent = 'Tersimpan';
      gambarDaftar();
    } catch (kesalahan) {
      elStatus.textContent = 'Gagal menyimpan';
      console.error(kesalahan);
    }
  }

  document.getElementById('btn-simpan').addEventListener('click', simpanCatatan);

  function jadwalkanAutoSave() {
    elStatus.textContent = 'Mengetik...';
    clearTimeout(waktuTimer);
    waktuTimer = setTimeout(simpanCatatan, 1000);
  }
  elInputJudul.addEventListener('input', jadwalkanAutoSave);
  elInputLabel.addEventListener('input', jadwalkanAutoSave);
  elInputStatus.addEventListener('change', jadwalkanAutoSave);
  elInputIsi.addEventListener('input', jadwalkanAutoSave);

  document.getElementById('btn-hapus').addEventListener('click', async function () {
    if (idAktif === null) return;
    const yakin = confirm('Hapus catatan ini? Tindakan ini tidak bisa dibatalkan.');
    if (!yakin) return;

    try {
      const respon = await fetch(`${SUPABASE_URL}/${TABEL}?id=eq.${idAktif}`, {
        method: 'DELETE',
        headers: headerDasar
      });
      if (!respon.ok) throw new Error('Gagal menghapus');

      daftarCatatan = daftarCatatan.filter(c => c.id !== idAktif);
      idAktif = null;
      elPanelTulis.style.display = 'none';
      elLayarKosong.style.display = 'flex';
      gambarDaftar();
    } catch (kesalahan) {
      alert('Gagal menghapus catatan.');
      console.error(kesalahan);
    }
  });

  // ===== 6. MENDENGARKAN SIARAN LANGSUNG (REALTIME) =====
  // Catatan penting: di sini kita TIDAK PERNAH mengubah urutan tampil
  // gara-gara ada data masuk. Item baru (INSERT) cukup ditambahkan ke
  // rak (array), lalu gambarDaftar() yang akan mengurutkannya sesuai
  // field "urutan" masing-masing — kalau item itu belum punya urutan,
  // otomatis nangkring di paling bawah, tidak menyerobot posisi yang
  // sudah kamu atur.
  const elIndikatorLive = document.getElementById('indikator-live');

  supabaseClient
    .channel('siaran-catatan')
    .on('postgres_changes', { event: '*', schema: 'public', table: TABEL }, function (kabar) {
      if (kabar.eventType === 'INSERT') {
        const sudahAda = daftarCatatan.some(c => c.id === kabar.new.id);
        if (!sudahAda) {
          daftarCatatan.push(kabar.new);
          gambarDaftar();
        }
      }

      if (kabar.eventType === 'UPDATE') {
        const idx = daftarCatatan.findIndex(c => c.id === kabar.new.id);
        if (idx !== -1) daftarCatatan[idx] = kabar.new;

        const sedangMengetik = document.activeElement === elInputJudul ||
                                document.activeElement === elInputLabel ||
                                document.activeElement === elInputStatus ||
                                document.activeElement === elInputIsi;
        if (kabar.new.id === idAktif && !sedangMengetik) {
          elInputJudul.value = kabar.new.judul || '';
          elInputLabel.value = kabar.new.label || '';
          elInputStatus.value = kabar.new.status || 'hidup';
          elInputIsi.value = kabar.new.isi || '';
        }
        gambarDaftar();
      }

      if (kabar.eventType === 'DELETE') {
        daftarCatatan = daftarCatatan.filter(c => c.id !== kabar.old.id);
        if (kabar.old.id === idAktif) {
          idAktif = null;
          elPanelTulis.style.display = 'none';
          elLayarKosong.style.display = 'flex';
        }
        gambarDaftar();
      }
    })
    .subscribe(function (status) {
      if (status === 'SUBSCRIBED') {
        elIndikatorLive.classList.remove('putus');
      } else if (status === 'CHANNEL_ERROR' || status === 'TIMED_OUT' || status === 'CLOSED') {
        elIndikatorLive.classList.add('putus');
      }
    });

  muatSemuaCatatan();
</script>
